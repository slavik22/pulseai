version: "3.9"

services:
  # ── PostgreSQL + pgvector ──────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: pulseai
      POSTGRES_USER: pulseai
      POSTGRES_PASSWORD: pulseai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulseai -d pulseai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PulseAI FastAPI backend ────────────────────────────────────────────────
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql+asyncpg://pulseai:pulseai@postgres:5432/pulseai
      DATABASE_URL_SYNC: postgresql+psycopg2://pulseai:pulseai@postgres:5432/pulseai
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_CHAT_MODEL: gpt-4o
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      APP_ENV: production
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── DB migrations (runs once, then exits) ─────────────────────────────────
  migrate:
    build:
      context: ./app
      dockerfile: Dockerfile
    command: >
      sh -c "pip install psycopg2-binary && alembic upgrade head"
    environment:
      DATABASE_URL_SYNC: postgresql+psycopg2://pulseai:pulseai@postgres:5432/pulseai
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    depends_on:
      - app

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
