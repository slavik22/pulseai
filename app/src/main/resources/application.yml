spring:
  application:
    name: support-desk

  threads:
    virtual:
      enabled: true   # Project Loom — virtual threads for all blocking I/O

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pulseai}
    username: ${DB_USER:pulseai}
    password: ${DB_PASSWORD:pulseai}
    host: ${DB_HOST:localhost}
    port: ${DB_PORT:5432}
    dbname: ${DB_NAME:pulseai}
    hikari:
      maximum-pool-size: 20

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration


ai:
  openai:
    api-key: ${OPENAI_API_KEY:sk-placeholder}
    chat-model: gpt-4o
    embedding-model: text-embedding-3-small

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
